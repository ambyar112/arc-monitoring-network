<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Monitoring Network</title>
    <style>
        body { font-family: sans-serif; background-color: #0d1117; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 2rem; border-radius: 10px; border: 1px solid #30363d; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; }
        p { color: #8b949e; }
        .status { display: inline-block; padding: 5px 15px; border-radius: 20px; background: #238636; color: white; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Arc Monitoring Network</h1>
        <p>Sistem monitoring aktif dan berjalan di latar belakang.</p>
        <div class="status">Vercel Deployment: Online</div>
        <hr style="border: 0.5px solid #30363d; margin: 20px 0;">
        <p style="font-size: 0.9rem;">Gunakan <code>setup.sh</code> atau <code>JALANKAN.bat</code> di lokal untuk memulai.</p>
    </div>
</body>
</html>
